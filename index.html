<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Today's Attendance Report – RFID System</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<style>
:root{
  --bg:#06080f;--s1:#0d1117;--s2:#111820;--s3:#162030;
  --border:#1c2c3e;--accent:#00d4ff;--green:#00e5a0;
  --red:#ff4d6d;--amber:#ffb830;--text:#dde6f0;--muted:#4a6075;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;--display:'Bebas Neue',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,212,255,.012) 2px,rgba(0,212,255,.012) 4px)}
.wrap{max-width:1080px;margin:0 auto;padding:28px 20px 60px;position:relative;z-index:1}

/* Header */
header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:16px}
.logo{display:flex;align-items:center;gap:14px}
.logo-icon{width:44px;height:44px;border:2px solid var(--accent);border-radius:8px;
  display:flex;align-items:center;justify-content:center;font-size:1.3rem;
  box-shadow:0 0 18px rgba(0,212,255,.2)}
.logo-text h1{font-family:var(--display);font-size:1.9rem;letter-spacing:.06em;
  background:linear-gradient(135deg,var(--accent),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-text p{font-size:.73rem;color:var(--muted);font-family:var(--mono);margin-top:2px}
.header-right{display:flex;gap:10px;align-items:center;flex-wrap:wrap}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:7px;
  font-family:var(--font);font-size:.82rem;font-weight:600;cursor:pointer;border:none;
  transition:all .18s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#06080f}
.btn-primary:hover{background:#33ddff;transform:translateY(-1px);box-shadow:0 4px 18px rgba(0,212,255,.3)}
.btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-amber{background:var(--amber);color:#06080f}
.btn-amber:hover{background:#ffc93c;transform:translateY(-1px);box-shadow:0 4px 18px rgba(255,184,48,.3)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}

/* Live dot */
.live{display:inline-flex;align-items:center;gap:6px;font-size:.72rem;font-family:var(--mono);color:var(--green)}
.live::before{content:'';width:7px;height:7px;background:var(--green);border-radius:50%;animation:pulse 1.4s ease infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.6)}}

/* Date banner */
.date-banner{background:var(--s1);border:1px solid var(--border);border-radius:10px;
  padding:12px 18px;margin-bottom:22px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.date-banner .date-label{font-family:var(--mono);font-size:.8rem;color:var(--accent)}
.date-banner .updated{font-family:var(--mono);font-size:.72rem;color:var(--muted)}

/* Error box */
.err-box{background:rgba(255,77,109,.1);border:1px solid rgba(255,77,109,.3);border-radius:8px;
  padding:12px 16px;font-size:.82rem;color:var(--red);margin-bottom:16px;display:none}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:22px}
.stat{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:18px 16px;
  position:relative;overflow:hidden;transition:transform .2s}
.stat:hover{transform:translateY(-2px)}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.stat.c-blue::before{background:var(--accent)}.stat.c-green::before{background:var(--green)}
.stat.c-red::before{background:var(--red)}.stat.c-amber::before{background:var(--amber)}
.stat-label{font-size:.68rem;font-family:var(--mono);text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
.stat-val{font-family:var(--display);font-size:2.4rem;letter-spacing:.04em;margin-top:6px;line-height:1}
.stat.c-blue .stat-val{color:var(--accent)}.stat.c-green .stat-val{color:var(--green)}
.stat.c-red .stat-val{color:var(--red)}.stat.c-amber .stat-val{color:var(--amber)}
.stat-sub{font-size:.68rem;font-family:var(--mono);color:var(--muted);margin-top:4px}

/* Charts row */
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:22px}
.chart-card{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:18px}
.chart-card-title{font-size:.82rem;font-weight:600;margin-bottom:12px;color:var(--text)}
.legend{display:flex;gap:14px;margin-bottom:10px;font-size:.72rem;font-family:var(--mono);color:var(--muted)}
.leg-item{display:flex;align-items:center;gap:5px}
.leg-sq{width:10px;height:10px;border-radius:2px}

/* Filter bar */
.filters{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.search{flex:1;min-width:180px;background:var(--s1);border:1px solid var(--border);
  border-radius:7px;color:var(--text);font-family:var(--mono);font-size:.82rem;
  padding:9px 13px;outline:none;transition:border-color .2s}
.search:focus{border-color:var(--accent)}
.search::placeholder{color:var(--muted)}
select.fsel{background:var(--s1);border:1px solid var(--border);border-radius:7px;
  color:var(--text);font-family:var(--mono);font-size:.78rem;padding:9px 13px;outline:none;cursor:pointer}
select.fsel:focus{border-color:var(--accent)}

/* Table card */
.card{background:var(--s1);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.card-head{display:flex;justify-content:space-between;align-items:center;
  padding:14px 18px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px}
.card-title{font-weight:600;font-size:.92rem}
.rec-count{font-family:var(--mono);font-size:.72rem;color:var(--muted)}
table{width:100%;border-collapse:collapse}
thead th{text-align:left;padding:10px 16px;font-size:.67rem;font-family:var(--mono);
  text-transform:uppercase;letter-spacing:.12em;color:var(--muted);
  background:var(--s2);border-bottom:1px solid var(--border)}
tbody tr{border-bottom:1px solid var(--border);transition:background .12s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--s2)}
td{padding:12px 16px;font-size:.85rem;vertical-align:middle}
.td-ts{font-family:var(--mono);font-size:.73rem;color:var(--muted);white-space:nowrap}
.td-uid{font-family:var(--mono);font-size:.73rem;color:var(--accent)}
.td-name{font-weight:600}
.grade-pill{display:inline-block;font-family:var(--mono);font-size:.68rem;
  padding:3px 9px;border-radius:20px;background:rgba(0,212,255,.1);color:var(--accent);border:1px solid rgba(0,212,255,.2)}
.badge{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);
  font-size:.72rem;font-weight:600;padding:4px 10px;border-radius:20px}
.badge-ok{background:rgba(0,229,160,.1);color:var(--green);border:1px solid rgba(0,229,160,.2)}
.badge-deny{background:rgba(255,77,109,.1);color:var(--red);border:1px solid rgba(255,77,109,.2)}
.badge-dot{width:5px;height:5px;border-radius:50%}
.badge-ok .badge-dot{background:var(--green)}.badge-deny .badge-dot{background:var(--red)}
.empty{text-align:center;padding:48px 20px;color:var(--muted);font-family:var(--mono);font-size:.82rem}
.empty .ico{font-size:2rem;margin-bottom:10px;opacity:.5}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;animation:rotate .65s linear infinite}
@keyframes rotate{to{transform:rotate(360deg)}}
#toast{position:fixed;bottom:22px;right:22px;background:var(--s1);border:1px solid var(--border);
  border-radius:8px;padding:11px 16px;font-family:var(--mono);font-size:.8rem;
  opacity:0;transform:translateY(10px);transition:all .25s;z-index:9999;max-width:280px}
#toast.show{opacity:1;transform:translateY(0)}
#toast.ok{border-left:3px solid var(--green);color:var(--green)}
#toast.err{border-left:3px solid var(--red);color:var(--red)}
#toast.inf{border-left:3px solid var(--accent);color:var(--accent)}

/* Print */
@media print{
  body{background:#fff!important;color:#000!important}
  body::after{display:none}
  .no-print{display:none!important}
  #printArea{display:block!important}
  #printArea *{color:#000!important;background:#fff!important;border-color:#ccc!important}
  .print-header{text-align:center;padding:0 0 16px;border-bottom:2px solid #222;margin-bottom:16px}
  .print-header h1{font-size:1.4rem;font-weight:800}
  .print-header p{font-size:.8rem;color:#555!important;margin-top:4px}
  .print-meta{display:flex;gap:24px;flex-wrap:wrap;font-size:.8rem;
    background:#f5f5f5!important;border:1px solid #ddd!important;
    border-radius:6px;padding:10px 14px;margin-bottom:14px}
  .print-summary{display:flex;gap:16px;margin-bottom:16px}
  .print-sum-card{border:1px solid #ccc!important;border-radius:6px;
    padding:8px 14px;text-align:center;min-width:80px}
  .print-sum-card .ps-val{font-size:1.4rem;font-weight:800}
  .print-sum-card .ps-lbl{font-size:.68rem;text-transform:uppercase;color:#666!important}
  table{width:100%;border-collapse:collapse;font-size:.82rem}
  thead th{background:#222!important;color:#fff!important;padding:8px 10px;
    text-align:left;font-size:.72rem;text-transform:uppercase}
  tbody td{padding:7px 10px;border-bottom:1px solid #eee!important}
  tbody tr:nth-child(even) td{background:#f9f9f9!important}
  .p-ok{color:#1a5c1a!important;font-weight:700}
  .p-deny{color:#8b0000!important;font-weight:700}
}
#printArea{display:none}

@media(max-width:700px){
  .wrap{padding:16px 12px 60px}
  .stats{grid-template-columns:repeat(2,1fr);gap:10px}
  .charts-row{grid-template-columns:1fr}
  .stat-val{font-size:1.8rem}
  header{margin-bottom:18px}
  .logo-text h1{font-size:1.6rem}
  .btn{padding:8px 13px;font-size:.78rem}
  thead th{font-size:.62rem;padding:8px 12px}
  td{padding:10px 12px;font-size:.8rem}
}
</style>
</head>
<body>

<div class="wrap">

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon">📡</div>
      <div class="logo-text">
        <h1>TODAY'S ATTENDANCE</h1>
        <p id="lastUpdated" class="no-print">Not loaded</p>
      </div>
    </div>
    <div class="header-right no-print">
      <span class="live" id="liveDot" style="display:none">LIVE</span>
      <button class="btn btn-amber" onclick="printToday()">🖨 Print</button>
      <button class="btn btn-ghost" id="autoBtn" onclick="toggleAuto()">⏱ Auto: OFF</button>
      <button class="btn btn-ghost" onclick="exportCSV()">⬇ CSV</button>
      <button class="btn btn-primary" id="loadBtn" onclick="loadData()">
        <span id="loadIcon">↻</span> Refresh
      </button>
    </div>
  </header>

  <!-- Date banner -->
  <div class="date-banner">
    <span class="date-label" id="dateBanner">—</span>
    <span class="updated" id="updatedLabel">Not loaded yet</span>
  </div>

  <!-- Error -->
  <div class="err-box" id="errBox"></div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat c-blue">
      <div class="stat-label">Total Scans</div>
      <div class="stat-val" id="sTotal">—</div>
      <div class="stat-sub">today</div>
    </div>
    <div class="stat c-green">
      <div class="stat-label">Authorised</div>
      <div class="stat-val" id="sAuth">—</div>
      <div class="stat-sub" id="sAuthPct">—</div>
    </div>
    <div class="stat c-red">
      <div class="stat-label">Denied</div>
      <div class="stat-val" id="sDeny">—</div>
      <div class="stat-sub" id="sDenyPct">—</div>
    </div>
    <div class="stat c-amber">
      <div class="stat-label">Unique Cards</div>
      <div class="stat-val" id="sUniq">—</div>
      <div class="stat-sub">individuals</div>
    </div>
  </div>

  <!-- Charts -->
  <div class="charts-row no-print">
    <div class="chart-card">
      <div class="chart-card-title">Authorised vs Denied</div>
      <div class="legend">
        <div class="leg-item"><div class="leg-sq" style="background:#00e5a0"></div>Authorised</div>
        <div class="leg-item"><div class="leg-sq" style="background:#ff4d6d"></div>Denied</div>
      </div>
      <div style="position:relative;height:180px">
        <canvas id="chartDonut" role="img" aria-label="Donut chart of authorised vs denied scans today">No data.</canvas>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-card-title">Scans by hour</div>
      <div style="position:relative;height:210px">
        <canvas id="chartHour" role="img" aria-label="Bar chart of scan count per hour today">No data.</canvas>
      </div>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters no-print">
    <input class="search" id="searchBox" placeholder="🔍  Search name, UID, grade…" oninput="renderTable()"/>
    <select class="fsel" id="fStatus" onchange="renderTable()">
      <option value="">All Status</option>
      <option>Authorised</option>
      <option>Denied</option>
    </select>
  </div>

  <!-- Table -->
  <div class="card">
    <div class="card-head">
      <span class="card-title">Today's Log</span>
      <span class="rec-count" id="recCount">0 records</span>
    </div>
    <div style="overflow-x:auto">
      <div id="tableArea">
        <div class="empty"><div class="ico">📡</div>Loading attendance data…</div>
      </div>
    </div>
  </div>
</div>

<!-- Print area -->
<div id="printArea"></div>

<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
// ── CONFIG ──────────────────────────────────────────────────
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwR1TN1kXarsTQ9_sdi0psxXqs6KwDO9TDCCe9ZP8w_6x6ZYAKQA8tCtsqHXy44bLlLfA/exec';
const AUTO_SEC   = 10; // auto-refresh interval in seconds

// ── STATE ────────────────────────────────────────────────────
let todayData = [], allData = [];
let donutChart = null, hourChart = null;
let autoOn = false, autoTimer = null;

const today = new Date().toISOString().slice(0, 10);

// ── INIT ─────────────────────────────────────────────────────
window.onload = () => {
  document.getElementById('dateBanner').textContent =
    new Date().toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  loadData();
  setTimeout(toggleAuto, 2000);
};

// ── LOAD DATA ────────────────────────────────────────────────
async function loadData() {
  const btn  = document.getElementById('loadBtn');
  const icon = document.getElementById('loadIcon');
  btn.disabled = true;
  icon.innerHTML = '<span class="spin"></span>';
  document.getElementById('errBox').style.display = 'none';

  try {
    const res  = await fetch(SCRIPT_URL + '?action=read');
    const json = await res.json();
    if (json.error) throw new Error(json.error);

    allData   = json.data || [];
    todayData = allData.filter(r => (r.timestamp || '').slice(0, 10) === today);

    updateStats();
    updateCharts();
    renderTable();

    const now = new Date().toLocaleTimeString();
    document.getElementById('lastUpdated').textContent   = 'Updated ' + now;
    document.getElementById('updatedLabel').textContent  = 'Last updated: ' + now;
    toast('Loaded ' + todayData.length + ' records for today', 'ok');
  } catch (e) {
    const eb = document.getElementById('errBox');
    eb.textContent  = '⚠ Could not load data: ' + e.message;
    eb.style.display = 'block';
    document.getElementById('tableArea').innerHTML =
      '<div class="empty"><div class="ico">⚠</div>Failed to load. Check SCRIPT_URL at top of file.</div>';
    toast('Error: ' + e.message, 'err');
  } finally {
    btn.disabled   = false;
    icon.textContent = '↻';
  }
}

// ── STATS ────────────────────────────────────────────────────
function updateStats() {
  const total = todayData.length;
  const auth  = todayData.filter(r => r.status === 'Authorised').length;
  const deny  = todayData.filter(r => r.status === 'Denied').length;
  const uniq  = new Set(todayData.map(r => r.uid)).size;

  document.getElementById('sTotal').textContent   = total;
  document.getElementById('sAuth').textContent    = auth;
  document.getElementById('sDeny').textContent    = deny;
  document.getElementById('sUniq').textContent    = uniq;
  document.getElementById('sAuthPct').textContent = total ? Math.round(auth/total*100) + '% of scans' : '—';
  document.getElementById('sDenyPct').textContent = total ? Math.round(deny/total*100) + '% of scans' : '—';
}

// ── CHARTS ───────────────────────────────────────────────────
function updateCharts() {
  const auth = todayData.filter(r => r.status === 'Authorised').length;
  const deny = todayData.filter(r => r.status === 'Denied').length;

  // Donut
  if (donutChart) donutChart.destroy();
  donutChart = new Chart(document.getElementById('chartDonut'), {
    type: 'doughnut',
    data: {
      labels: ['Authorised', 'Denied'],
      datasets: [{
        data: [auth, deny],
        backgroundColor: ['#00e5a0', '#ff4d6d'],
        borderColor:     ['#0d1117'],
        borderWidth: 3,
        hoverOffset: 6
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '68%',
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ` ${ctx.label}: ${ctx.parsed}` } }
      }
    }
  });

  // Hourly bar
  const hourCounts = Array(24).fill(0);
  todayData.forEach(r => {
    const m = (r.timestamp || '').match(/(\d+):/);
    if (m) hourCounts[parseInt(m[1])]++;
  });
  const labels = [], counts = [];
  hourCounts.forEach((c, h) => { if (c > 0) { labels.push(h + ':00'); counts.push(c); } });

  if (hourChart) hourChart.destroy();
  hourChart = new Chart(document.getElementById('chartHour'), {
    type: 'bar',
    data: {
      labels: labels.length ? labels : ['No scans'],
      datasets: [{
        label: 'Scans',
        data:   counts.length ? counts : [0],
        backgroundColor: '#00d4ff',
        borderRadius: 5,
        borderSkipped: false
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: {
          ticks: { color: '#4a6075', font: { size: 11 }, autoSkip: false, maxRotation: 45 },
          grid:  { display: false }
        },
        y: {
          ticks: { color: '#4a6075', font: { size: 11 }, stepSize: 1 },
          beginAtZero: true,
          grid:  { color: 'rgba(28,44,62,.6)' }
        }
      }
    }
  });
}

// ── TABLE ────────────────────────────────────────────────────
function renderTable() {
  const q   = document.getElementById('searchBox').value.toLowerCase();
  const fst = document.getElementById('fStatus').value;

  let rows = todayData.filter(r => {
    const ms  = !q   || [r.name, r.uid, r.grade].some(v => (v||'').toLowerCase().includes(q));
    const mst = !fst || r.status === fst;
    return ms && mst;
  }).slice().reverse();

  document.getElementById('recCount').textContent = rows.length + ' records';

  if (!rows.length) {
    document.getElementById('tableArea').innerHTML =
      '<div class="empty"><div class="ico">🔍</div>No records match.</div>';
    return;
  }

  const trs = rows.map((r, i) => `
    <tr style="animation:rowIn .22s ease ${Math.min(i*.02,.4)}s both">
      <td class="td-ts">${(r.timestamp||'—').replace('T',' ')}</td>
      <td class="td-uid">${r.uid||'—'}</td>
      <td class="td-name">${r.name||'—'}</td>
      <td><span class="grade-pill">${r.grade||'—'}</span></td>
      <td><span class="badge ${r.status==='Authorised'?'badge-ok':'badge-deny'}">
        <span class="badge-dot"></span>${r.status||'—'}</span></td>
    </tr>`).join('');

  document.getElementById('tableArea').innerHTML = `
    <table>
      <thead><tr>
        <th>Timestamp</th><th>UID</th><th>Name</th><th>Grade</th><th>Status</th>
      </tr></thead>
      <tbody>${trs}</tbody>
    </table>`;
}

// ── PRINT ────────────────────────────────────────────────────
function printToday() {
  const rows = todayData.slice().reverse();
  if (!rows.length) { toast('No records to print', 'err'); return; }

  const auth = rows.filter(r => r.status === 'Authorised').length;
  const deny = rows.filter(r => r.status === 'Denied').length;
  const uniq = new Set(rows.map(r => r.uid)).size;

  const trs = rows.map(r => `
    <tr>
      <td>${r.timestamp||'—'}</td>
      <td>${r.uid||'—'}</td>
      <td><strong>${r.name||'—'}</strong></td>
      <td>${r.grade||'—'}</td>
      <td class="${r.status==='Authorised'?'p-ok':'p-deny'}">${r.status||'—'}</td>
    </tr>`).join('');

  document.getElementById('printArea').innerHTML = `
    <div class="print-header">
      <h1>RFID ATTENDANCE — TODAY'S REPORT</h1>
      <p>Date: ${new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</p>
      <p>Generated: ${new Date().toLocaleString()}</p>
    </div>
    <div class="print-meta">
      <span><strong>Total Scans:</strong> ${rows.length}</span>
      <span><strong>Authorised:</strong> ${auth}</span>
      <span><strong>Denied:</strong> ${deny}</span>
      <span><strong>Unique Cards:</strong> ${uniq}</span>
    </div>
    <table>
      <thead><tr>
        <th>Timestamp</th><th>UID</th><th>Name</th><th>Grade</th><th>Status</th>
      </tr></thead>
      <tbody>${trs}</tbody>
    </table>`;

  setTimeout(() => window.print(), 200);
}

// ── CSV EXPORT ───────────────────────────────────────────────
function exportCSV() {
  if (!todayData.length) { toast('No data to export', 'err'); return; }
  const hdr  = ['Timestamp','UID','Name','Grade','Status'];
  const rows = todayData.map(r =>
    [r.timestamp, r.uid, r.name, r.grade, r.status]
      .map(v => `"${(v||'').replace(/"/g,'""')}"`)
      .join(',')
  );
  const blob = new Blob([[hdr.join(','), ...rows].join('\n')], { type:'text/csv' });
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = 'attendance_today_' + today + '.csv';
  a.click();
  toast('CSV exported', 'ok');
}

// ── AUTO REFRESH ─────────────────────────────────────────────
function toggleAuto() {
  autoOn = !autoOn;
  const btn  = document.getElementById('autoBtn');
  const live = document.getElementById('liveDot');
  if (autoOn) {
    btn.textContent      = '⏱ Auto: ON';
    btn.style.borderColor = 'var(--green)';
    btn.style.color       = 'var(--green)';
    live.style.display    = 'inline-flex';
    autoTimer = setInterval(loadData, AUTO_SEC * 1000);
  } else {
    btn.textContent      = '⏱ Auto: OFF';
    btn.style.borderColor = '';
    btn.style.color       = '';
    live.style.display    = 'none';
    clearInterval(autoTimer);
  }
}

// ── TOAST ────────────────────────────────────────────────────
function toast(msg, type = 'inf') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = 'show ' + type;
  clearTimeout(t._t);
  t._t = setTimeout(() => (t.className = ''), 3000);
}

// row animation
const style = document.createElement('style');
style.textContent = '@keyframes rowIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}';
document.head.appendChild(style);
</script>
